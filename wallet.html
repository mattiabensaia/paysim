<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltix Wallet</title>
    <meta name="description" content="Ricevi il resto digitale sul tuo telefono">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* QR Scanner UI */
        .scanner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #qr-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #qr-canvas {
            display: none;
        }

        .scanner-overlay::after {
            content: '';
            position: absolute;
            width: 250px;
            height: 250px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .scanner-controls {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 210;
        }

        .close-scanner-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }

        .scan-fab {
            position: fixed;
            bottom: 6rem;
            right: 1.5rem;
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--background);
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            cursor: pointer;
            z-index: 100;
            border: none;
            transition: transform 0.2s;
        }

        .scan-fab:active {
            transform: scale(0.9);
        }
    </style>
    <style>
        body {
            padding: 0;
            margin: 0;
        }

        .app-container {
            padding: 0;
            width: 100vw;
            height: 100vh;
        }

        .phone-section {
            width: 100%;
            height: 100%;
            perspective: none;
        }

        .phone-mockup {
            width: 100%;
            height: 100%;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
            transform: none !important;
        }

        .phone-screen {
            border-radius: 0;
        }

        .notch {
            display: none;
        }

        .pairing-overlay {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.9);
            padding: 1rem 2rem;
            border-radius: 50px;
            border: 1px solid var(--accent);
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .pairing-code {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .pairing-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Onboarding UI */
        .onboarding-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 500;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .onboarding-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 300px;
        }

        .onboarding-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
        }

        .onboarding-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .onboarding-input:focus {
            border-color: var(--accent);
        }

        .onboarding-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="phone-section">
            <div class="phone-mockup">
                <div class="phone-screen">
                    <!-- Onboarding Overlay -->
                    <div class="onboarding-overlay" id="onboardingOverlay">
                        <div class="onboarding-card">
                            <img src="icon-192.png" class="onboarding-logo" alt="Voltix Logo">
                            <h2 style="margin-bottom: 1.5rem;">Benvenuto in Voltix</h2>
                            <input type="text" id="onboardingName" class="onboarding-input" placeholder="Il tuo Nome">
                            <input type="text" id="onboardingSurname" class="onboarding-input"
                                placeholder="Il tuo Cognome">
                            <button class="onboarding-btn" id="startOnboardingBtn">Inizia</button>
                        </div>
                    </div>

                    <div class="app-header">
                        <h3>MyWallet</h3>
                        <div class="user-greeting">Benvenuto, <span id="displayUserName">Utente</span></div>
                    </div>

                    <div class="balance-card">
                        <div class="balance-title">Saldo Disponibile</div>
                        <div class="balance-amount">€ <span id="walletBalance">12.50</span></div>
                        <div class="card-chip"></div>
                    </div>

                    <div class="transactions-section">
                        <h4>Transazioni Recenti</h4>
                        <div class="transactions-list" id="transactionList">
                            <!-- Transactions populated here -->
                            <div class="transaction-item">
                                <div class="tx-icon out"><i class="fas fa-shopping-bag"></i></div>
                                <div class="tx-details">
                                    <div class="tx-title">Spesa Settimanale</div>
                                    <div class="tx-time">Oggi, 14:20</div>
                                </div>
                                <div class="tx-amount negative">-45.00 €</div>
                            </div>
                        </div>
                    </div>



                    <!-- Floating Action Buttons Container -->
                    <div
                        style="position: fixed; bottom: 6rem; right: 1.5rem; display: flex; flex-direction: column; gap: 1rem; z-index: 100;">
                        <!-- Virtual Card Button -->
                        <button class="scan-fab" id="virtualCardBtn" style="position: relative; right: 0; bottom: 0;">
                            <i class="fas fa-credit-card"></i>
                        </button>
                        <!-- Scanner Button -->
                        <button class="scan-fab" id="openScannerBtn" style="position: relative; right: 0; bottom: 0;">
                            <i class="fas fa-qrcode"></i>
                        </button>
                    </div>

                    <!-- Virtual Card Overlay -->
                    <div class="virtual-card-overlay" id="virtualCardOverlay">
                        <div class="virtual-card">
                            <div class="card-chip"></div>
                            <div class="card-balance">€ <span id="virtualCardBalance">12.50</span></div>
                            <div class="card-details">
                                <span class="card-name" id="virtualCardName">NOME UTENTE</span>
                                <i class="fas fa-wifi fa-rotate-90 nfc-icon"></i>
                            </div>
                        </div>
                        <button class="nfc-pay-btn" id="simulateNFCPayBtn">
                            <i class="fas fa-contactless"></i> Avvicina al POS
                        </button>
                        <button class="close-card-btn" id="closeVirtualCardBtn">Chiudi Carta</button>
                    </div>

                    <!-- QR Scanner Overlay -->
                    <div class="scanner-overlay" id="scannerOverlay">
                        <video id="qr-video" playsinline autoplay muted></video>
                        <canvas id="qr-canvas"></canvas>
                        <div class="scanner-controls">
                            <button class="close-scanner-btn" id="closeScannerBtn">Chiudi Scanner</button>
                        </div>
                    </div>

                    <!-- Notification Popup (CRITICAL FIX: Was missing, causing JS crash) -->
                    <div class="notification-overlay" id="notificationOverlay">
                        <div class="notification-card">
                            <i class="fas fa-check-circle"
                                style="color: var(--success); font-size: 2.5rem; margin-bottom: 0.5rem;"></i>
                            <h3>Pagamento Ricevuto!</h3>
                            <div class="notif-amount" id="notifAmount">+0.00 €</div>
                            <div class="notif-sender" id="notifSender">Da: Cassa</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="wallet.js"></script>
    <script>
        // PWA: Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then((reg) => console.log('[PWA] Service Worker registrato', reg.scope))
                .catch((err) => console.log('[PWA] SW fallito', err));
        }

        // PWA: Install Banner
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Show custom install banner
            const banner = document.createElement('div');
            banner.id = 'installBanner';
            banner.innerHTML = `
                <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#1e3a5f,#7c3aed);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;z-index:999;box-shadow:0 -4px 20px rgba(0,0,0,0.4)">
                    <div style="display:flex;align-items:center;gap:0.8rem">
                        <img src="icon-192.png" style="width:40px;height:40px;border-radius:10px">
                        <div>
                            <div style="font-weight:700;font-size:0.95rem">Installa Voltix App</div>
                            <div style="font-size:0.75rem;color:rgba(255,255,255,0.7)">Accesso rapido dalla Home</div>
                        </div>
                    </div>
                    <button id="installBtn" style="background:#38bdf8;color:#0f172a;border:none;padding:0.6rem 1.2rem;border-radius:8px;font-weight:700;font-size:0.85rem;cursor:pointer">Installa</button>
                </div>
            `;
            document.body.appendChild(banner);

            document.getElementById('installBtn').addEventListener('click', () => {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') {
                        console.log('[PWA] App installata!');
                    }
                    banner.remove();
                    deferredPrompt = null;
                });
            });
        });
    </script>
</body>

</html>
