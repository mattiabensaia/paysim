<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltix Terminal - POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .app-container {
            height: 100vh;
            width: 100vw;
            max-width: none;
        }

        .glass-panel {
            width: 450px;
            max-height: 95vh;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .glass-panel .header {
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
        }

        .glass-panel .input-group {
            margin-bottom: 0.8rem;
        }

        .glass-panel .summary-box {
            margin: 0.8rem 0;
            padding: 0.8rem;
        }

        .connection-card {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .conn-id-display {
            color: var(--accent);
            font-weight: 700;
        }

        .conn-status {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }

        .dot.online {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <div class="cashier-section glass-panel">
            <div class="header">
                <i class="fas fa-cash-register"></i>
                <h2>Cassa Centrale</h2>
            </div>

            <!-- Connection Logic -->
            <div class="connection-card" style="margin-bottom:0.5rem; padding:0.5rem 0.8rem">
                <label style="font-size:0.75rem; color: var(--text-muted); display:block; margin-bottom:0.3rem">URL
                    Pubblico (per QR)</label>
                <div class="input-wrapper">
                    <i class="fas fa-globe"></i>
                    <input type="text" id="publicUrl" placeholder="https://..."
                        value="https://mattiabensaia.github.io/paysim"
                        style="padding:0.6rem 0.6rem 0.6rem 2.2rem; font-size:0.8rem">
                </div>
                <input type="hidden" id="targetPeerId" value="">
                <div class="conn-status" id="connStatus" style="display:none">
                    <div class="dot" id="statusDot"></div>
                    <span id="statusText">Non connesso</span>
                </div>
            </div>

            <div class="input-group">
                <label for="customerName">Nome Cliente</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="customerName" placeholder="Es. Mattia Bensaia" value="Mattia Bensaia">
                </div>
            </div>

            <div class="input-group">
                <label for="totalCost">Costo Prodotto (€)</label>
                <div class="input-wrapper">
                    <i class="fas fa-euro-sign"></i>
                    <input type="number" id="totalCost" placeholder="0.00" value="3.90" step="0.01">
                </div>
            </div>

            <div class="input-group">
                <label for="cashGiven">Contanti Ricevuti (€)</label>
                <div class="input-wrapper">
                    <i class="fas fa-money-bill-wave"></i>
                    <input type="number" id="cashGiven" placeholder="0.00" value="5.00" step="0.01">
                </div>
            </div>

            <div class="summary-box">
                <div class="summary-row">
                    <span>Resto Digitale:</span>
                    <span id="changeAmount" class="highlight-text">1.10 €</span>
                </div>
                <div class="error-msg" id="errorMessage">Contanti insufficienti</div>
            </div>

            <button id="sendActionBtn" class="primary-btn" disabled>
                <i class="fas fa-paper-plane"></i> Invia Resto al Telefono
            </button>
            <div class="status-msg" id="statusMessage">In attesa di connessione...</div>

            <!-- QR Code Fallback -->
            <div id="qrOverlay" class="qr-overlay" style="display: none;">
                <p>Scansiona per ricevere il resto:</p>
                <div id="qrcode"></div>
                <button id="closeQrBtn" class="secondary-btn">Chiudi QR</button>
            </div>
        </div>
    </div>

    <script src="pos.js"></script>
</body>

</html>
